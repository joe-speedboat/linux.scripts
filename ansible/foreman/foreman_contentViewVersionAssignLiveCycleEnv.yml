#
# Foreman API DOC: https://foreman.domain.tld/apidoc
#
# Description:
#   This Ansible playbook promotes a specific version of a content view
#   to a designated lifecycle environment in Red Hat Satellite or Foreman.
#   It supports promoting to 'latest' or a specific version number.
#
# Usage:
#   ansible-playbook foreman_contentViewVersionAssignLiveCycleEnv.yml
#
# Configuration:
#   - Edit the 'vars' section below to match your environment:
#     * foremanUrl: URL of your Foreman/Satellite server
#     * foremanUser: Username with appropriate permissions (Manager role recommended)
#     * foremanPassword: Password for the Foreman user
#     * contentViewName: Name of the content view to promote
#     * contentViewVersion: Version to promote ('latest' or a specific version like '3.0')
#     * lifecycleEnvironmentName: Target lifecycle environment (e.g., 'LcProd')
#     * foremanCvPromoteForce: Set to True to force promotion (bypass dependencies)
#     * validate_certs: Set to False if using self-signed certificates
#
- hosts: localhost
  gather_facts: no
  vars:
    foremanCvPromoteForce: True
    validate_certs: False
    foremanUser: 'admin'
    foremanPassword: "xxxx"
    foremanUrl: "https://foreman.domain.tld"
    contentViewName: 'cv_rocky9'
    # contentViewVersion: '3.0'
    contentViewVersion: 'latest'
    lifecycleEnvironmentName: 'LcProd'
  tasks:
    # Retrieve the content view ID by name
    - name: Get the content view ID
      uri:
        url: "{{ foremanUrl }}/katello/api/content_views"
        method: GET
        return_content: yes
        body_format: json
        status_code: 200
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        validate_certs: "{{ validate_certs }}"
      register: contentViewResult

    # Extract the content view ID from the results
    - set_fact:
        contentViewId: "{{ item.id }}"
      with_items: "{{ contentViewResult.json.results }}"
      when: item.name == contentViewName

    # Retrieve all versions of the specified content view
    - name: Get the specific content view version IDs
      uri:
        url: "{{ foremanUrl }}/katello/api/content_views/{{ contentViewId }}/content_view_versions"
        method: GET
        return_content: yes
        body_format: json
        status_code: 200
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        validate_certs: "{{ validate_certs }}"
      register: contentViewVersionsResult

    # Find the ID for a specific version if not 'latest'
    - name: find specivic content view version ID
      set_fact:
        contentViewVersionId: "{{ item.id }}"
      with_items: "{{ contentViewVersionsResult.json.results }}"
      when: item.version == contentViewVersion and not contentViewVersion == 'latest'

    # Find the ID for the latest version if 'latest' is specified
    - name: find latest content view version ID
      set_fact:
        contentViewVersionId: "{{ contentViewVersionsResult.json.results[0].id }}"
      when: contentViewVersion == 'latest'

    # Retrieve the list of lifecycle environments to find the target environment ID
    - name: Get the lifecycle environment ID
      uri:
        url: "{{ foremanUrl }}/katello/api/environments"
        method: GET
        return_content: yes
        body_format: json
        status_code: 200
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        validate_certs: "{{ validate_certs }}"
      register: lifecycleEnvironmentResult

    # Extract the lifecycle environment ID by name
    - name: define lifecycleEnvironmentId
      set_fact:
        lifecycleEnvironmentId: "{{ item.id }}"
      with_items: "{{ lifecycleEnvironmentResult.json.results }}"
      when: item.name == lifecycleEnvironmentName

    # Promote the content view version to the target lifecycle environment
    - name: Promote a content view version to a lifecycle environment
      uri:
        url: "{{ foremanUrl }}/katello/api/content_view_versions/{{ contentViewVersionId }}/promote"
        method: POST
        body:
          id: "{{ contentViewVersionId }}"
          environment_ids: "{{ lifecycleEnvironmentId }}"
          force: "{{ foremanCvPromoteForce }}"
        body_format: json
        status_code: 202
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        validate_certs: "{{ validate_certs }}"
      register: promoteTask

    # Poll the promotion task until it completes
    - name: Poll until promote task is complete
      uri:
        url: "{{ foremanUrl }}/foreman_tasks/api/tasks/{{ promoteTask.json.id }}"
        method: GET
        return_content: yes
        body_format: json
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        validate_certs: "{{ validate_certs }}"
      register: taskResult
      until: taskResult.json.state == 'stopped'
      retries: 30
      delay: 10
...
