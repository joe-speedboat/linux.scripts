# -----------------------------------------------------------------------
# This playbook is used to delete a specific version of a content view in Foreman.
# It first retrieves all versions of the content view, checks if any version has no assigned environments,
# and if so, deletes the version with the lowest id that is older than the protectDays threshold.
#
# Use Case:
# - Automate cleanup of old, unused content view versions to free up space and maintain a tidy Foreman environment.
# - Safely delete versions that are not promoted to any environment and older than a specified number of days.
#
# Foreman API DOC: https://foreman.domain.tld/apidoc
# -----------------------------------------------------------------------
# Variables:
# - validate_certs: Whether to validate SSL certificates. Set to False if using self-signed certificates.
# - foremanUser: The username to authenticate with Foreman API.
# - foremanPassword: The password to authenticate with Foreman API.
# - foremanUrl: The URL of the Foreman server.
# - contentViewName: The name of the content view to delete a version from.
# - failIfEmpty: Whether to fail the playbook if there are no versions to delete.
# - doDebug: Whether to print debug information.
# - protectDays: Never delete ContentViewVersion if newer than x days (safety threshold).
# -----------------------------------------------------------------------
- hosts: localhost
  gather_facts: yes
  vars:
    validate_certs: False
    foremanUser: 'admin'
    foremanPassword: 'xxx'
    foremanUrl: 'https://foreman.domain.tld'
    contentViewName: 'cv_rocky10'
    failIfEmpty: False
    doDebug: True
    protectDays: 90
  tasks:
    # Calculate the cutoff date for deletion based on protectDays
    - name: Calculate the date protectDays ago
      set_fact:
        protectDate: "{{ '%Y-%m-%d' | strftime((ansible_date_time.epoch | int) - ((protectDays | int) * 24 * 60 * 60)) }}"

    # Retrieve all content views from Foreman API
    - name: Retrieve all versions of the specified content view
      uri:
        url: "{{ foremanUrl }}/katello/api/content_views"
        method: GET
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        return_content: yes
        timeout: 60
        body_format: json
        status_code: 200
        validate_certs: "{{ validate_certs }}"
      register: contentViewResult

    # Find the ID of the specified content view by name
    - name: Get ID of content view named {{ contentViewName }}
      set_fact:
        contentViewId: "{{ item.id }}"
      with_items: "{{ contentViewResult.json.results }}"
      when: item.name == contentViewName
      no_log: "{{ not doDebug }}"

    # Identify the oldest version of the content view (sorted by published date)
    - name: Select the content view version with the lowest published date
      set_fact:
        oldest_version: >-
          {{
            contentViewResult.json.results
            | selectattr('name', 'equalto', contentViewName)
            | map(attribute='versions')
            | first
            | sort(attribute='published')
            | first
          }}

    # Default to not deleting unless conditions are met
    - name: Set doDelete to false by default
      set_fact:
        doDelete: False

    # Check if the oldest version is eligible for deletion (no environments assigned and older than protectDays)
    - name: Set doDelete to true if the oldest content view version has no environments and is older than protectDays
      set_fact:
        doDelete: True
      when:
        - oldest_version.environment_ids | length == 0
        - oldest_version.published.split(' ')[0] < protectDate

    # Delete the eligible content view version if doDelete is true
    - name: Delete the version with lowest id={{ oldest_version.id if oldest_version is defined and oldest_version is mapping else '' }}
      uri:
        url: "{{ foremanUrl }}/katello/api/content_view_versions/{{ oldest_version.id if oldest_version is defined and oldest_version is mapping else '' }}"
        method: DELETE
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        status_code: 202
        validate_certs: "{{ validate_certs }}"
      register: deleteTask
      when: doDelete

    # Display the result of the deletion request
    - name: Print deleteTask
      debug:
        var: deleteTask
      when: doDebug

    # Poll the Foreman task status until completion
    - name: Poll the Foreman API to check the status of the deletion
      uri:
        url: "{{ foremanUrl }}/foreman_tasks/api/tasks/{{ deleteTask.json.id }}"
        method: GET
        force_basic_auth: yes
        url_username: "{{ foremanUser }}"
        url_password: "{{ foremanPassword }}"
        return_content: yes
        timeout: 60
        body_format: json
        status_code: 200
        validate_certs: "{{ validate_certs }}"
      register: deleteResult
      until: deleteResult.json.state == 'stopped'
      retries: 30
      delay: 10
      when: doDelete

    # Inform if no version was eligible for deletion
    - name: Print a message if there is no version to delete
      debug:
        msg: "Content View {{ contentViewName }} has no eligible versions that are ready for deletion"
      when: not doDelete

    # Fail the playbook if no version was eligible and failIfEmpty is set to True
    - name: Fail the playbook if there is no version to delete and failIfEmpty is set to True
      fail:
        msg: "No version to delete"
      when: not doDelete and failIfEmpty == True

    # Print debug information if enabled
    - name: Print debug information if doDebug is set to True
      debug:
        msg:
        - "contentViewName={{ contentViewName }}"
        - "oldest_version={{ oldest_version }}"
        - "doDelete={{ doDelete }}"
        - "failIfEmpty={{ failIfEmpty }}"
        - "protectDate={{ protectDate }}"
        - "oldest_version.published={{ oldest_version.published.split(' ')[0] }}"
      when: doDebug
...
